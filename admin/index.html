<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — GlucoCoach</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, getDocs, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const ADMIN_EMAIL = 'glucocoach10@gmail.com';

  const firebaseConfig = {
    apiKey: "AIzaSyDfwVmBY7Td5C7LwCUY6YvI_OVcp2Q5vYk",
    authDomain: "glucocoach-29151.firebaseapp.com",
    projectId: "glucocoach-29151",
    storageBucket: "glucocoach-29151.firebasestorage.app",
    messagingSenderId: "989677277216",
    appId: "1:989677277216:web:7da58464b4c31d47b22c45"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    if (!user) {
      showLogin();
      return;
    }
    if (user.email !== ADMIN_EMAIL) {
      document.getElementById('loginScreen').innerHTML = `
        <div style="text-align:center;padding:40px">
          <div style="font-size:48px;margin-bottom:16px">🚫</div>
          <h2 style="font-family:'Fraunces',serif;color:#c84b1f;margin-bottom:8px">Acceso denegado</h2>
          <p style="color:#7a7060;margin-bottom:20px">Tu cuenta no tiene permisos de administrador.</p>
          <button onclick="logout()" style="background:#1a6b3c;color:white;border:none;padding:10px 24px;border-radius:100px;cursor:pointer;font-family:inherit">Cerrar sesión</button>
        </div>`;
      return;
    }
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('adminEmail').textContent = user.email;
    await loadDashboard();
  });

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
  }

  window.loginWithGoogle = async () => {
    try {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
    } catch(e) {
      alert('Error al iniciar sesión.');
    }
  };

  window.logout = async () => { await signOut(auth); };

  async function loadDashboard() {
    try {
      const usersSnap = await getDocs(collection(db, 'users'));
      const users = [];
      usersSnap.forEach(d => users.push({ id: d.id, ...d.data() }));

      const now = new Date();
      const total = users.length;
      const active = users.filter(u => u.subscriptionStatus === 'active').length;
      const trial = users.filter(u => u.subscriptionStatus === 'trial').length;
      const expired = users.filter(u => u.subscriptionStatus === 'expired' || u.subscriptionStatus === 'inactive').length;
      const revenue = active * 9.99;

      // Alertas — usuarios que expiran en 2 días
      const expiringSoon = users.filter(u => {
        if (u.subscriptionStatus !== 'trial') return false;
        const trialEndsAt = u.trialEndsAt?.toDate ? u.trialEndsAt.toDate() : new Date(u.trialEndsAt);
        const daysLeft = Math.ceil((trialEndsAt - now) / (1000 * 60 * 60 * 24));
        return daysLeft <= 2 && daysLeft > 0;
      });

      // Stats
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-active').textContent = active;
      document.getElementById('stat-trial').textContent = trial;
      document.getElementById('stat-expired').textContent = expired;
      document.getElementById('stat-revenue').textContent = '$' + revenue.toFixed(2);

      // Alertas
      const alertsContainer = document.getElementById('alertsList');
      if (expiringSoon.length === 0) {
        alertsContainer.innerHTML = '<p style="color:var(--muted);font-size:13px">No hay usuarios por vencer en los próximos 2 días.</p>';
      } else {
        alertsContainer.innerHTML = expiringSoon.map(u => {
          const trialEndsAt = u.trialEndsAt?.toDate ? u.trialEndsAt.toDate() : new Date(u.trialEndsAt);
          const daysLeft = Math.ceil((trialEndsAt - now) / (1000 * 60 * 60 * 24));
          return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
            <div>
              <div style="font-size:13px;font-weight:500">${u.email}</div>
              <div style="font-size:11px;color:#c84b1f">Vence en ${daysLeft} día${daysLeft > 1 ? 's' : ''}</div>
            </div>
            <button onclick="extendTrial('${u.userId}')" style="background:var(--accent-light);border:1px solid #b8dfc6;border-radius:8px;padding:6px 12px;font-size:12px;color:var(--accent);cursor:pointer;font-family:inherit">+7 días</button>
          </div>`;
        }).join('');
      }

      // Lista usuarios
      const usersContainer = document.getElementById('usersList');
      const sorted = [...users].sort((a, b) => {
        const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt || 0);
        const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt || 0);
        return dateB - dateA;
      });

      usersContainer.innerHTML = sorted.map(u => {
        const createdAt = u.createdAt?.toDate ? u.createdAt.toDate() : new Date(u.createdAt || 0);
        const dateStr = createdAt.toLocaleDateString('es-MX', { day: 'numeric', month: 'short', year: 'numeric' });
        let daysLeft = '—';
        if (u.subscriptionStatus === 'trial' && u.trialEndsAt) {
          const trialEndsAt = u.trialEndsAt?.toDate ? u.trialEndsAt.toDate() : new Date(u.trialEndsAt);
          daysLeft = Math.ceil((trialEndsAt - now) / (1000 * 60 * 60 * 24));
          daysLeft = daysLeft > 0 ? daysLeft + ' días' : 'Expirado';
        }
        const statusColor = {
          active: { bg: '#e8f5ed', color: '#1a6b3c', label: '✓ Activo' },
          trial: { bg: '#fef3c7', color: '#d97706', label: '⏳ Prueba' },
          expired: { bg: '#fde8e0', color: '#c84b1f', label: '✗ Expirado' },
          inactive: { bg: '#fde8e0', color: '#c84b1f', label: '✗ Inactivo' }
        }[u.subscriptionStatus] || { bg: '#f0f0f0', color: '#666', label: u.subscriptionStatus };

        return `<tr>
          <td style="padding:12px 8px;font-size:13px">${u.email || '—'}</td>
          <td style="padding:12px 8px;font-size:13px">${dateStr}</td>
          <td style="padding:12px 8px">
            <span style="font-size:11px;padding:3px 8px;border-radius:20px;background:${statusColor.bg};color:${statusColor.color};font-weight:500">${statusColor.label}</span>
          </td>
          <td style="padding:12px 8px;font-size:13px">${daysLeft}</td>
          <td style="padding:12px 8px">
            <div style="display:flex;gap:6px">
              <button onclick="extendTrial('${u.userId}')" style="background:var(--accent-light);border:1px solid #b8dfc6;border-radius:6px;padding:4px 8px;font-size:11px;color:var(--accent);cursor:pointer;font-family:inherit">+7 días</button>
              <button onclick="revokeAccess('${u.userId}')" style="background:#fde8e0;border:1px solid #f8c4b4;border-radius:6px;padding:4px 8px;font-size:11px;color:#c84b1f;cursor:pointer;font-family:inherit">Dar de baja</button>
            </div>
          </td>
        </tr>`;
      }).join('');

    } catch(e) {
      console.error('Error cargando dashboard:', e);
    }
  }

  window.extendTrial = async (userId) => {
    if (!confirm('¿Extender 7 días de prueba a este usuario?')) return;
    try {
      const userRef = doc(db, 'users', userId);
      const newTrialEnd = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000);
      await updateDoc(userRef, {
        subscriptionStatus: 'trial',
        trialEndsAt: newTrialEnd
      });
      alert('✅ Prueba extendida 7 días.');
      await loadDashboard();
    } catch(e) {
      alert('Error al extender prueba.');
    }
  };

  window.revokeAccess = async (userId) => {
    if (!confirm('¿Dar de baja a este usuario? Perderá acceso inmediatamente.')) return;
    try {
      const userRef = doc(db, 'users', userId);
      await updateDoc(userRef, { subscriptionStatus: 'expired' });
      alert('✅ Usuario dado de baja.');
      await loadDashboard();
    } catch(e) {
      alert('Error al dar de baja.');
    }
  };

  window.refreshDashboard = async () => { await loadDashboard(); };
</script>
<style>
  :root { --bg: #f5f0e8; --surface: #fffdf8; --border: #e0d8c8; --accent: #1a6b3c; --accent-light: #e8f5ed; --text: #1c1a16; --muted: #7a7060; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  #loginScreen {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 20px;
  }

  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 40px; max-width: 380px;
    width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  }

  .login-card h2 { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .btn-google {
    width: 100%; background: white; border: 1.5px solid var(--border);
    border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.2s; color: var(--text);
  }
  .btn-google:hover { border-color: var(--accent); color: var(--accent); }

  #adminPanel { display: none; }

  header {
    background: var(--accent); color: white; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }

  .header-logo { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; opacity: 0.9; }

  .btn-logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: inherit; }
  .btn-refresh { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: inherit; }

  main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }

  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; text-align: center; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 700; }
  .stat-value.green { color: var(--accent); }
  .stat-value.orange { color: #d97706; }
  .stat-value.red { color: #c84b1f; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
  .panel h3 { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; margin-bottom: 16px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  tr:hover td { background: rgba(0,0,0,0.02); }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    table { font-size: 11px; }
    th, td { padding: 8px 4px; }
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div style="font-size:40px;margin-bottom:16px">🔐</div>
    <h2>Panel de Admin</h2>
    <p>Acceso exclusivo para administradores de GlucoCoach</p>
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Entrar con Google
    </button>
  </div>
</div>

<div id="adminPanel">
  <header>
    <div class="header-logo">🩺 GlucoCoach Admin</div>
    <div class="header-right">
      <span id="adminEmail"></span>
      <button class="btn-refresh" onclick="refreshDashboard()">🔄 Actualizar</button>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </header>

  <main>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total usuarios</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Activos</div>
        <div class="stat-value green" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">En prueba</div>
        <div class="stat-value orange" id="stat-trial">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Expirados</div>
        <div class="stat-value red" id="stat-expired">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ingresos/mes est.</div>
        <div class="stat-value green" id="stat-revenue">—</div>
      </div>
    </div>

    <!-- Alertas -->
    <div class="panel">
      <h3>⚠️ Usuarios por vencer (próximos 2 días)</h3>
      <div id="alertsList">Cargando...</div>
    </div>

    <!-- Lista de usuarios -->
    <div class="panel">
      <h3>👥 Todos los usuarios</h3>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Registro</th>
              <th>Estado</th>
              <th>Días restantes</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usersList"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

</body>
</html>
